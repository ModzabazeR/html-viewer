name: Deploy Shelter plugin to Pages

# Builds the Shelter plugin + SSG site and publishes it to the gh-pages branch,
# which GitHub Pages serves. Single job = one runner (more resilient than the
# split build/deploy-pages flow). Pages source must be set to the gh-pages branch.

on:
  push:
    branches: [main]
    paths:
      - "shelter/**"
      - "core/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build plugin + static site
        working-directory: shelter
        run: |
          pnpm install --no-frozen-lockfile
          pnpm exec lune ci
          pnpm exec lune ssg ci

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: shelter/dist
          publish_branch: gh-pages
